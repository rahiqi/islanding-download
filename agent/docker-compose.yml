# Downloader agent — run on any node that can reach the dispatcher and Kafka.
# Build from repository root:
#
#   Main (64-bit):  docker compose -f agent/docker-compose.yml up -d
#   Pi 32-bit:      BUILD_ARM32=1 ./compose.sh up -d   (or use -f docker-compose.arm32.yml)
#
# Required env (or set in .env):
#   DISPATCHER_URL   — dispatcher base URL (e.g. http://dispatcher-host:8084)
#   KAFKA_BOOTSTRAP_SERVERS — Kafka/Redpanda brokers (e.g. kafka-host:9092)
#
# Optional:
#   AGENT_NAME, AGENT_LOCATION, AGENT_ID
#   AGENT_LOCAL_URL — base URL for local file serving (e.g. http://192.168.1.10:8080). If set, completed
#                     downloads get a "Download from agent (local)" link; /downloads/* is restricted to private IPs.
#   AGENT_DOWNLOAD_PATH — directory to store completed files (default: downloads).
#
# Target platform (for Portainer / single-file use):
#   Raspberry Pi 32-bit: set AGENT_PLATFORM=linux/arm/v7 and AGENT_DOCKERFILE=RaspberryPi2 in the stack env.
#   Main (64-bit): leave both unset.
volumes:
  downloads:
services:
  downloader-agent:
    platform: ${AGENT_PLATFORM-}
    volumes:
      - downloads:/app/downloads
    build:
      context: ..
      dockerfile: agent/downloader-agent/Dockerfile${AGENT_DOCKERFILE:-}
    environment:
      ASPNETCORE_URLS: http://+:8080
      DISPATCHER_URL: ${DISPATCHER_URL:?DISPATCHER_URL is required}
      AGENT_NAME: ${AGENT_NAME:-}
      AGENT_LOCATION: ${AGENT_LOCATION:-}
      AGENT_ID: ${AGENT_ID:-}
      DownloadWorker__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS:?KAFKA_BOOTSTRAP_SERVERS is required}
      Heartbeat__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS}
      AGENT_LOCAL_URL: ${AGENT_LOCAL_URL:-}
      AGENT_DOWNLOAD_PATH: ${AGENT_DOWNLOAD_PATH:-downloads}
    # Expose 8081 so users on the local network can use the "Download from agent" link (AGENT_LOCAL_URL).
    ports:
      - "${AGENT_PORT:-8081}:8080"
